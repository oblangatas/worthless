name: Verify worthless-mcp package

on:
  pull_request:
    paths:
      - "packages/worthless-mcp/**"
      - "tests/test_mcp_npx_wrapper_mount.py"
      - ".github/workflows/verify-npm.yml"
      - ".github/workflows/publish-npm.yml"
  push:
    branches:
      - main
    paths:
      - "packages/worthless-mcp/**"

permissions:
  contents: read

jobs:
  dry-run-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/worthless-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: ""  # disable npm cache — dry-run publish must not participate in shared cache (cache-poisoning)

      - name: Validate package manifest
        run: node -e "const p = require('./package.json'); if (!p.version || !p.name || !p.bin) { console.error('manifest missing required fields'); process.exit(1); }"

      - name: Smoke-test --version flag
        run: |
          node index.js --version
          OUT=$(node index.js --version)
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${OUT}" != "${PKG_VERSION}" ]; then
            echo "version mismatch: CLI reported '${OUT}', package.json has '${PKG_VERSION}'"
            exit 1
          fi

      - name: npm publish --dry-run
        run: npm publish --dry-run --access public

  wrapper-mount:
    # Proves the path a real editor/agent walks — `npx worthless-mcp` → uv →
    # uvx → the MCP server — actually boots and mounts exactly the 4 tools.
    # This is the gap that let the 0.3.9 split release ship broken: npm had
    # worthless-mcp@0.3.9 while PyPI had no worthless==0.3.9, so every
    # `npx worthless-mcp` died unsatisfiable and no test caught it (WOR-809).
    # Bonus: because the wheel is built from pyproject's version but the
    # wrapper requests package.json's version, a drift between the two (the
    # WOR-811 root cause) makes the offline resolve fail and this job go red.
    #
    # Coverage split (not a gap): tool-surface *drift* — a tool added/renamed
    # in src/worthless/mcp — is caught on every PR by
    # tests/test_mcp_stdio_contract.py in the default pytest pass. THIS job
    # guards the wrapper + bootstrap + version-drift path (npx -> uv -> uvx,
    # npm-vs-PyPI), which regresses on packages/worthless-mcp + release changes
    # — hence the narrower `paths:` trigger above.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: ""  # no shared npm cache (cache-poisoning); the wrapper is run, not published

      - name: Set up uv + Python
        uses: ./.github/actions/setup-uv-python

      - name: Build the PR wheel (the bytes under test)
        run: uv build --wheel

      - name: Pre-seed an isolated uv cache with the PR wheel
        # Option A: install the PR wheel into a clean, isolated uv cache. The
        # mount step then runs offline, so the ONLY worthless[mcp] that can
        # resolve is this wheel — never a stray PyPI copy of the same version.
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uvcache
          UV_TOOL_DIR: ${{ runner.temp }}/uvtools
          UV_TOOL_BIN_DIR: ${{ runner.temp }}/uvtools/bin
        run: |
          set -euo pipefail
          # `-print -quit` stops after the first match in-process — no `| head`
          # that could SIGPIPE `find` (141) under bash pipefail and flake red.
          wheel="$(find "${PWD}/dist" -maxdepth 1 -name 'worthless-*.whl' -print -quit)"
          test -n "${wheel}" || { echo "no worthless wheel built in dist/"; exit 1; }
          echo "pre-seeding ${wheel}"
          uv tool install "worthless[mcp] @ file://${wheel}"

      - name: Build the test harness (MCP client + pytest)
        run: |
          uv venv "${RUNNER_TEMP}/mountvenv"
          uv pip install --python "${RUNNER_TEMP}/mountvenv" \
            mcp pytest pytest-asyncio pytest-xdist pytest-rerunfailures pytest-timeout

      - name: Mount test — real npx wrapper, offline (PR bytes only)
        env:
          WORTHLESS_NPX_MOUNT_TEST: "1"
          UV_OFFLINE: "1"
          UV_CACHE_DIR: ${{ runner.temp }}/uvcache
          UV_TOOL_DIR: ${{ runner.temp }}/uvtools
          UV_TOOL_BIN_DIR: ${{ runner.temp }}/uvtools/bin
        run: |
          "${RUNNER_TEMP}/mountvenv/bin/pytest" tests/test_mcp_npx_wrapper_mount.py \
            --noconftest -o asyncio_mode=auto -o addopts="" -q
