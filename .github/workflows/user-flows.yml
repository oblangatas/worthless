name: User-flow CI

# The PR trigger is intentionally UNFILTERED so these checks always report —
# a path-scoped *required* status check that never runs would block every PR
# that doesn't touch these paths forever (worthless-kp4u). The Detect step in
# each matrix leg no-ops the run on PRs that don't touch user-flow-relevant
# paths. Pushes keep the path filter (only fire on relevant changes).

on:
  pull_request:
  push:
    branches:
      - "**"
    paths:
      - "tests/user_flows/**"
      - "src/worthless/cli/**"
      - "src/worthless/storage/**"
      - "src/worthless/crypto/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/actions/setup-uv-python/**"
      - ".github/workflows/user-flows.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  user-flows:
    name: User flows (${{ matrix.os }}, py3.13)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15

    steps:
      - name: Detect user-flow-relevant changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Non-PR events (push, workflow_dispatch) reach here only on relevant
          # paths or by explicit dispatch, so always run for them.
          relevant=true
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            relevant=false
            # Fail open: a transient `gh pr diff` error must not fail this
            # required check and block unrelated PRs — run the suite instead.
            if ! files="$(gh pr diff "${{ github.event.pull_request.number }}" \
              --name-only --repo "${{ github.repository }}")"; then
              echo "::warning::Could not read PR diff; running the user-flow suite (fail-open)."
              relevant=true
              files=""
            fi
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                tests/user_flows/*) relevant=true ;;
                src/worthless/cli/*|src/worthless/storage/*|src/worthless/crypto/*) relevant=true ;;
                pyproject.toml|uv.lock) relevant=true ;;
                .github/actions/setup-uv-python/*) relevant=true ;;
                .github/workflows/user-flows.yml) relevant=true ;;
              esac
            done <<< "$files"
          fi
          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"
          if [ "$relevant" = "true" ]; then
            echo "User-flow-relevant paths changed — running the suite."
          else
            echo "No user-flow-relevant paths changed — passing without the run."
          fi

      - name: Check out repository
        if: steps.detect.outputs.relevant == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv + Python
        if: steps.detect.outputs.relevant == 'true'
        uses: ./.github/actions/setup-uv-python

      - name: Provision ephemeral keychain + fail-fast access probe (macOS)
        # worthless-fc14: the real-keychain user-flow tests were skipped on CI
        # (worthless-3ynb) because the headless runner's login keychain is locked and
        # `worthless lock`'s Keychain access blocks on a GUI prompt that never comes,
        # hanging the job to its 15-min timeout. Create + unlock a throwaway keychain,
        # try to grant non-interactive item access, then PROBE with python `keyring`
        # (what worthless's keystore uses) under a HARD 5s timeout. Only set the
        # run-flag when the probe passes — so if access still prompts, the tests SKIP
        # cleanly in seconds instead of hanging. pytest-timeout can't rescue us here:
        # the block is a C-level Security.framework call that ignores the signal, so
        # the guard has to live at the workflow level. (The @REQUIRES_SYNC_ENTITLEMENT
        # subset needs a code-signed interpreter and stays skipped regardless.)
        if: runner.os == 'macOS' && steps.detect.outputs.relevant == 'true'
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        shell: bash
        run: |
          set -uo pipefail   # NOT -e: a failed/timed-out probe is handled, not fatal
          KC="$RUNNER_TEMP/wless-ci.keychain-db"
          security create-keychain -p "" "$KC"
          security set-keychain-settings "$KC"          # no auto-lock timeout
          security unlock-keychain -p "" "$KC"
          security list-keychains -d user -s "$KC"
          security default-keychain -s "$KC"
          # NB: `security set-key-partition-list -S apple-tool:,apple:,unsigned:` was
          # tried here and PROVEN not to help (run 88045781340): it grants signed-tool
          # access to KEYS, not the per-item ACL that python keyring's generic-password
          # items need — the probe below still blocked to the timeout. Deliberately left
          # out rather than kept as a misleading no-op. Don't re-add it without evidence.
          # Sync deps FIRST so the timed probe measures keychain access, not a cold sync.
          uv sync --extra dev --extra test >/dev/null 2>&1 || true
          TIMEOUT="$(command -v timeout || command -v gtimeout || true)"
          if [ -n "$TIMEOUT" ] && "$TIMEOUT" 5 uv run --no-sync python -c 'import keyring; keyring.set_password("wless-ci-probe","u","v"); assert keyring.get_password("wless-ci-probe","u")=="v"; keyring.delete_password("wless-ci-probe","u")'; then
            echo "WORTHLESS_TEST_KEYCHAIN_READY=1" >> "$GITHUB_ENV"
            echo "::notice::keychain probe passed — real-keychain user-flow tests will RUN"
          else
            echo "::warning::keychain not non-interactively accessible (probe timed out/failed); real-keychain user-flow tests SKIP (worthless-fc14)"
          fi

      - name: Run user-flow tests
        if: steps.detect.outputs.relevant == 'true'
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p user-flow-traces
          uv sync --extra dev --extra test
          uv run pytest tests/user_flows -m user_flow 2>&1 | tee user-flow-traces/pytest-${{ runner.os }}.log

      - name: Render terminal traces
        if: ${{ always() && steps.detect.outputs.relevant == 'true' }}
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        shell: bash
        run: |
          set -euo pipefail
          uv run python tests/user_flows/render_traces.py \
            --output user-flow-traces/TERMINAL_TRACES-${{ runner.os }}.md

      - name: Upload terminal traces
        if: ${{ always() && steps.detect.outputs.relevant == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: user-flow-traces-${{ runner.os }}-${{ github.run_id }}
          path: user-flow-traces/**
          if-no-files-found: ignore
          retention-days: 14

  windows-deferred:
    name: Windows user flows deferred
    runs-on: windows-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Record deferred coverage
        shell: pwsh
        run: |
          "Windows native user-flow coverage is intentionally deferred for WOR-446 first pass."
          "This job does not claim WSL coverage."
