# Grype configuration — read by anchore/scan-action when present at repo root.
#
# Ignores are time-boxed. Each entry MUST carry:
#   - vulnerability ID
#   - reason citing the upstream status
#   - linear ticket for the bump/recheck obligation
#   - expiry date — past this point, Grype auto-re-fires the finding
#
# Review every Monday via the scheduled docker-security workflow run.

ignore:
  - vulnerability: CVE-2026-15308
    package:
      name: python
      type: binary
    # Python 3.13.14 (the latest 3.13.x — no 3.13.15 base image exists yet)
    # carries CVE-2026-15308 (High). Grype's only fixed version is Python
    # 3.15.0, a PRE-RELEASE; there is no stable 3.13.x backport released yet.
    # Moving the Docker base to a Python pre-release is the wrong trade against
    # shipping a CVE whose attack surface in our proxy is bounded (non-root,
    # network-isolated, no untrusted input parsed at the Python boundary).
    #
    # Supersedes the prior CVE-2026-7210 ignore: that one affected 3.13.13 and
    # is fixed in the current 3.13.14 base (grype no longer reports it).
    #
    # Linear: WOR-691 — bump the Docker base image when a stable 3.13.x patch
    # ships the backport, then remove this ignore.
    reason: "Upstream fix only in Python 3.15.0 (pre-release); no stable 3.13.x backport yet. Tracking WOR-691."
    expiry: "2026-08-10"  # ~30 days; recheck when python:3.13.15-slim-bookworm ships.
